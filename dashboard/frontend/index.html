<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLab OS Console</title>
  <link rel="icon" type="image/png" href="logo.png">
  <!-- Typography Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- App Shell -->
  <div class="app-shell" style="display: none;">
    <!-- Mobile Navigation Overlay Backdrop -->
    <div class="sidebar-backdrop hidden" id="sidebar-backdrop"></div>
    
    <!-- Left Navigation Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header" style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;" title="Toggle Collapse">
        <img src="logo.png" alt="HomeLab OS Logo" style="width: 24px; height: 24px; object-fit: contain; flex-shrink: 0;">
        <div class="logo">HOMELAB OS</div>
      </div>
      
      <nav class="sidebar-nav" id="sidebar-nav-menu">
        <!-- Dynamically populated workspaces load here -->
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile-card" id="user-profile-card" style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0.5rem; margin-bottom: 0.75rem; border-bottom: 1px dashed rgba(255,255,255,0.05); overflow: hidden; width: 100%;">
          <div class="user-avatar" id="user-avatar" style="width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #a855f7, #3b82f6); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 0.8rem; flex-shrink: 0;">
            A
          </div>
          <div class="user-info" style="display: flex; flex-direction: column; gap: 0.1rem; min-width: 0;">
            <span class="user-display-name" id="user-display-name" style="font-size: 0.75rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Loading...</span>
            <span class="user-role" id="user-role" style="font-size: 0.6rem; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase;">ADMIN</span>
          </div>
        </div>
        <div class="os-version" id="host-kernel">Kernel: Detecting...</div>
      </div>
    </aside>

    <!-- Main Viewport Dashboard Area -->
    <main class="main-content">
      
      <!-- Command Bar Search (VS Code Style) -->
      <div class="command-bar" title="Press Ctrl+K to search globally">
        <span class="prompt-symbol">&gt;</span>
        <input type="text" placeholder="Type command here or press Ctrl+K to search globally..." id="cmd-palette" autocomplete="off">
      </div>

      <div class="dashboard-grid">
        
        <!-- HEADER STATUS BAR -->
        <header class="grid-header">
          <button class="hamburger-btn" id="sidebar-toggle-btn" aria-label="Toggle Navigation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <div class="header-main-info">
            <span class="os-title" id="host-name">HOMELAB OS</span>
            <span class="os-divider">|</span>
            <span class="os-meta" id="host-os">Detecting OS...</span>
            <span class="os-bullet">•</span>
            <span class="os-meta">Uptime: <span id="live-uptime">Detecting...</span></span>
          </div>

          <div class="header-status-pills" id="header-status-pills">
            <!-- Dynamically populated status pills -->
          </div>
          <div class="header-time-block" style="cursor: pointer;" onclick="window.storeTriggerNotificationCenter()" title="View Notification History">
            <div class="clock-date" id="clock-date">-- --- ----</div>
            <div class="clock-time" id="clock-time">--:--:--</div>
          </div>
        </header>

        <!-- WIDGET GRID VIEWPORT -->
        <section class="widget-viewport" id="widget-grid-viewport">
          <!-- Widgets load dynamically here (Phase 1 Grid Engine) -->
        </section>

      </div>
    </main>
  </div>

  <!-- Setup Wizard Overlay -->
  <div id="setup-wizard-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Console Setup Wizard</h2>
        <p>Configure the primary Super Admin account to initialize HomeLab OS.</p>
      </div>
      <form id="setup-form">
        <div class="form-group">
          <label for="setup-username">USERNAME</label>
          <input type="text" id="setup-username" placeholder="admin" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="setup-display-name">DISPLAY NAME</label>
          <input type="text" id="setup-display-name" placeholder="Administrator" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="setup-password">PASSWORD</label>
          <div style="position: relative; display: flex; align-items: center;">
            <input type="password" id="setup-password" placeholder="••••••••" required style="padding-right: 3.5rem;">
            <button type="button" class="password-toggle-btn" data-target="setup-password" style="position: absolute; right: 0.6rem;">SHOW</button>
          </div>
        </div>
        <div class="form-group">
          <label for="setup-confirm-password">CONFIRM PASSWORD</label>
          <div style="position: relative; display: flex; align-items: center;">
            <input type="password" id="setup-confirm-password" placeholder="Re-enter password" required style="padding-right: 3.5rem;">
            <button type="button" class="password-toggle-btn" data-target="setup-confirm-password" style="position: absolute; right: 0.6rem;">SHOW</button>
          </div>
        </div>
        <div class="form-error" id="setup-error" style="color: #ef4444; font-size: 0.75rem; display: none;"></div>
        <button type="submit" id="btn-setup-submit" class="btn-primary" disabled>Initialize Credentials</button>
      </form>
    </div>
  </div>

  <!-- Login Overlay -->
  <div id="login-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Access Console</h2>
        <p>Authenticate to access the HomeLab OS secure dashboard.</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-username">USERNAME</label>
          <input type="text" id="login-username" placeholder="Username" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="login-password">PASSWORD</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div class="form-error" id="login-error" style="color: #ef4444; font-size: 0.75rem; display: none;"></div>
        <button type="submit" class="btn-primary">Authenticate</button>
      </form>
    </div>
  </div>

  <!-- JavaScript App Bootstrapper Module -->
  <script type="module" src="app.js"></script>
</body>
</html>
