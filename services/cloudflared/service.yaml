id: cloudflared
name: Cloudflared
category: Networking
description: Secure Cloudflare Tunnel client daemon
version: latest
icon: cloudflare.png
enabled: true
autostart: true
status: managed
compose: docker-compose.yml
domain:
  public: N/A
  local: N/A
ports: {}
volumes:
  - config
depends_on: []
backup:
  enabled: true
homepage:
  enabled: true
portainer:
  enabled: true
monitoring:
  uptime_kuma: true
  prometheus: false
labels:
  docker: true
tags:
  - networking
  - tunnel
  - security
actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
