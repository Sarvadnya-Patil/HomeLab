id: prometheus
name: Prometheus
category: Monitoring
description: Systems monitoring and time-series telemetry database.
version: v2.52.0
icon: prometheus.png
enabled: true
autostart: true
status: Online
compose: docker-compose.yml
domain:
  public: prometheus.example.com
  local: http://prometheus:9090
ports:
  http: 9090
volumes:
  - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  - ./data:/prometheus
depends_on:
  - node-exporter
  - cadvisor
backup:
  enabled: true
  path: services/prometheus/data
homepage:
  enabled: true
portainer:
  enabled: true
monitoring:
  uptime_kuma: true
  prometheus: false
labels:
  docker: true
tags:
  - metrics
  - database
actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
