version: '3.8'

services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only access is sufficient to read logs
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - homelab-network
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Dozzle"
      - "homepage.icon=dozzle.png"
      - "homepage.href=http://dozzle.local" # Route local or configure via your Cloudflare Tunnel
      - "homepage.description=Real-time Docker container log viewer"

networks:
  homelab-network:
    external: true

