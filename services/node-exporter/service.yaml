id: node-exporter
name: Node Exporter
category: Monitoring
description: Prometheus agent for host hardware and OS metrics.
version: v1.8.1
icon: prometheus.png
enabled: true
autostart: true
status: Online
compose: docker-compose.yml
domain:
  public: node-exporter.example.com
  local: http://node-exporter:9100
ports:
  http: 9100
volumes:
  - /proc:/host/proc:ro
  - /sys:/host/sys:ro
  - /:/rootfs:ro
depends_on: []
backup:
  enabled: false
homepage:
  enabled: true
portainer:
  enabled: true
monitoring:
  uptime_kuma: true
  prometheus: false
labels:
  docker: true
tags:
  - metrics
  - hardware
actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
