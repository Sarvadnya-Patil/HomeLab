version: '3.8'

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PORTAINER_HTTPS_PORT:-9443}:9443"
      - "${PORTAINER_HTTP_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Read-write mount required to inspect and manage server containers
      - ./data:/data                             # Persistent data volume for database (portainer.db) and SSL certs
      - ./backup:/backup                         # Mount point for exporting local database snapshots
    environment:
      - TZ=${TZ:-UTC}
    networks:
      - homelab-network
    labels:
      - "homepage.group=Management"
      - "homepage.name=Portainer"
      - "homepage.icon=portainer.png"
      - "homepage.href=https://portainer.local" # Route local or configure via your Cloudflare tunnel
      - "homepage.description=Docker Container & Stack Management Interface"

networks:
  homelab-network:
    external: true


# NOTE ON HEALTHCHECKS:
# Portainer's official docker image is built from "scratch" and does not contain shell (`sh`), `curl`, or `wget`.
# Because of this, adding a Docker-native health check will fail with "executable file not found".
# Uptime and health checking should instead be performed externally (e.g., using Uptime Kuma pointing to /api/status).
