id: portainer
name: Portainer
category: Management
description: Docker container management panel
version: latest
icon: portainer.png
enabled: true
autostart: true
status: managed
compose: docker-compose.yml
domain:
  public: portainer.example.com
  local: portainer.local
ports:
  http: 9000
  https: 9443
volumes:
  - data
  - backup

capabilities:
  - start
  - stop
  - restart
  - logs
  - terminal
  - backup

permissions:
  - docker.control
  - logs.view

settings:
  - key: host_domain
    label: Host Public Domain
    type: text
    required: true
    default: portainer.local
    description: Public DNS or local IP domain pointing to the container instance.
  - key: enable_ssl
    label: Enable SSL TLS HTTPS
    type: toggle
    required: false
    default: false
    description: Force SSL termination for incoming proxy requests.
  - key: restart_policy
    label: Container Restart Policy
    type: select
    required: true
    default: always
    options:
      - always
      - unless-stopped
      - on-failure
    description: Docker daemon daemon recovery restart policy.

commands:
  - id: portainer.restart
    title: Restart Portainer Panel
    action: run-command:service:portainer:restart
  - id: portainer.logs
    title: View Portainer Output Logs
    action: run-command:service:portainer:logs

backup:
  enabled: true
  command: tar -czf backups/portainer.tar.gz -C services/portainer/data .
  exportPath: backups/portainer.tar.gz
  retentionDays: 7

actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
