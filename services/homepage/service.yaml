id: homepage
name: Homepage
category: Infrastructure
description: Central navigation landing dashboard
version: latest
icon: homepage.png
enabled: true
autostart: true
status: managed
compose: docker-compose.yml
domain:
  public: homepage.example.com
  local: homepage.local
ports:
  http: 3000
volumes:
  - config
  - data
depends_on: []
backup:
  enabled: true
homepage:
  enabled: true
portainer:
  enabled: true
monitoring:
  uptime_kuma: true
  prometheus: false
labels:
  docker: true
tags:
  - infrastructure
  - dashboard
actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
