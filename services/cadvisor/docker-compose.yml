version: '3.8'

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - homelab-network
    ports:
      - "8082:8080"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # Homepage Configuration
      - "homepage.group=Monitoring"
      - "homepage.name=cAdvisor"
      - "homepage.icon=docker.svg"
      - "homepage.href=http://cadvisor:8080/metrics"
      - "homepage.description=Container telemetry collector"

networks:
  homelab-network:
    external: true
