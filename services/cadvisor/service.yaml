id: cadvisor
name: cAdvisor
category: Monitoring
description: Container resource and performance analysis agent.
version: v0.49.1
icon: cadvisor.png
enabled: true
autostart: true
status: Online
compose: docker-compose.yml
domain:
  public: cadvisor.example.com
  local: http://cadvisor:8080
ports:
  http: 8082
volumes:
  - /:/rootfs:ro
  - /var/run:/var/run:ro
  - /sys:/sys:ro
  - /var/lib/docker/:/var/lib/docker:ro
  - /dev/disk/:/dev/disk:ro
depends_on: []
backup:
  enabled: false
homepage:
  enabled: true
portainer:
  enabled: true
monitoring:
  uptime_kuma: true
  prometheus: false
labels:
  docker: true
tags:
  - metrics
  - containers
actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
