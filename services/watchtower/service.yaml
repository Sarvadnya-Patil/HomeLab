id: watchtower
name: Watchtower
category: Management
description: Automated container image updates
version: latest
icon: watchtower.png
enabled: true
autostart: true
status: managed
compose: docker-compose.yml
domain:
  public: N/A
  local: N/A
ports: {}
volumes: []
depends_on: []
backup:
  enabled: false # Watchtower is stateless
homepage:
  enabled: true
portainer:
  enabled: true
monitoring:
  uptime_kuma: true
  prometheus: false
labels:
  docker: true
tags:
  - management
  - updater
actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
