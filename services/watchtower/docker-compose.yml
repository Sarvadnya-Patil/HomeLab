version: '3.8'

services:
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Required read-write access to update container configurations
    environment:
      - TZ=${TZ:-UTC}
      - WATCHTOWER_LABEL_ENABLE=${WATCHTOWER_LABEL_ENABLE:-true} # ONLY update containers explicitly flagged with com.centurylinklabs.watchtower.enable=true
      - WATCHTOWER_CLEANUP=${WATCHTOWER_CLEANUP:-true}         # Remove old, orphaned images after completing an update
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE:-0 0 4 * * *} # Runs updates at 4:00 AM daily
    labels:
      - "homepage.group=Management"
      - "homepage.name=Watchtower"
      - "homepage.icon=watchtower.png"
      - "homepage.href=N/A"
      - "homepage.description=Automated Docker container updater daemon"
