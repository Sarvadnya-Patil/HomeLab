version: '3.8'

services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - ./data:/app/data                         # Stores SQLite database (kuma.db) and system settings
      - ./backup:/backup                         # Target directory for database backups and dumps
    environment:
      - TZ=${TZ:-UTC}
      - UPTIME_KUMA_PORT=3001                    # Internal application port
    networks:
      - homelab-network
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Uptime Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=http://uptime-kuma.local" # Route locally or configure via Cloudflare Tunnel
      - "homepage.description=Ping and endpoint uptime monitor"

networks:
  homelab-network:
    external: true


# NOTE ON HEALTHCHECKS:
# Uptime Kuma's base image already compiles and runs an internal healthcheck script
# (`node extra/healthcheck.js`) every 60 seconds. Therefore, we do not need to explicitly declare
# a redundant healthcheck block here, keeping the compose file clean.
