id: uptime-kuma
name: Uptime Kuma
category: Monitoring
description: HTTP and ping status monitoring
version: latest
icon: uptime-kuma.png
enabled: true
autostart: true
status: managed
compose: docker-compose.yml
domain:
  public: uptime.example.com
  local: uptime.local
ports:
  http: 3001
volumes:
  - data
  - backup
depends_on: []
backup:
  enabled: true
homepage:
  enabled: true
portainer:
  enabled: true
monitoring:
  uptime_kuma: false # Self-monitoring is false to avoid loops
  prometheus: true
labels:
  docker: true
tags:
  - monitoring
  - uptime
actions:
  start: docker compose up -d
  stop: docker compose down
  restart: docker compose restart
  update: docker compose pull && docker compose up -d
  logs: docker compose logs -f
