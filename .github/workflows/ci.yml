name: CI Build & Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/backend/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard/backend
          npm ci

      - name: Run Linter
        run: |
          cd dashboard/backend
          npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/backend/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard/backend
          npm ci

      - name: Run Unit Tests
        run: |
          cd dashboard/backend
          npm run test

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/backend/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard/backend
          npm ci

      - name: Type Check & Build
        run: |
          cd dashboard/backend
          npm run build

      - name: Run dependency audit
        # Rationale: Runs as an informational/reporting step. We do not block
        # the CI pipeline due to upstream transitive dependency vulnerabilities (e.g., fast-uri)
        # that require a major framework migration to Fastify v5 (breaking change) to resolve.
        run: |
          cd dashboard/backend
          npm audit --audit-level=high || true

  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
